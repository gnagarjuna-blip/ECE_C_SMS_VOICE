<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Marks Distribution | Rounded</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 40px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #e74c3c; padding-bottom: 10px; }
        .upload-section { border: 2px dashed #bdc3c7; padding: 40px; text-align: center; border-radius: 8px; background: #fafafa; margin: 20px 0; cursor: pointer; transition: 0.3s; }
        .upload-section:hover { border-color: #e74c3c; background: #fff5f5; }
        .btn-group { text-align: center; margin-top: 25px; }
        button { padding: 12px 25px; font-size: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-process { background: #e74c3c; color: white; }
        .btn-process:hover { background: #c0392b; }
        .btn-download { background: #27ae60; color: white; display: none; margin-left: 10px; }
        #status { margin-top: 20px; text-align: center; font-weight: bold; }
        .info { font-size: 0.9em; color: #666; background: #fef9e7; padding: 10px; border-radius: 4px; border-left: 4px solid #f1c40f; }
    </style>
</head>
<body>

<div class="container">
    <h2>Secure Marks Distribution (Whole Numbers Only)</h2>
    <div class="info">
        <b>Settings:</b> Password is <b>nagarjuna</b>. <br>
        Only 4 questions answered. No decimals. Blanks for unused questions.
    </div>

    <div class="upload-section" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" style="display:none" onchange="handleFileSelect(this)"/>
        <div id="fileStatus">Click to Upload Student List</div>
    </div>

    <div class="btn-group">
        <button class="btn-process" onclick="validateAndProcess()">Generate Rounded Split</button>
        <button id="downloadBtn" class="btn-download" onclick="exportToExcel()">Download Excel</button>
    </div>

    <div id="status"></div>
</div>

<script>
    let processedRows = [];
    const DEFAULT_PASS = "nagarjuna";

    function handleFileSelect(input) {
        if(input.files.length > 0) {
            document.getElementById('fileStatus').innerText = "Selected: " + input.files[0].name;
            document.getElementById('status').innerText = "";
        }
    }

    function validateAndProcess() {
        const fileInput = document.getElementById('fileInput');
        if (!fileInput.files[0]) { alert("Please select a file."); return; }

        const userPass = prompt("Enter Password:");
        if (userPass === DEFAULT_PASS) {
            processMarks();
        } else if (userPass !== null) {
            alert("Wrong Password!");
        }
    }

    function processMarks() {
        const fileInput = document.getElementById('fileInput');
        const reader = new FileReader();

        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet);

            processedRows = rows.map(row => {
                const roll = row["Roll No"] || row["roll no"] || Object.values(row)[0];
                const total = Math.round(parseFloat(row["Total Marks"] || row["total"] || Object.values(row)[1]));
                return splitLogic(roll, total);
            });

            document.getElementById('status').innerHTML = `<span style="color: #27ae60;">✔ Processed ${processedRows.length} students with rounded marks.</span>`;
            document.getElementById('downloadBtn').style.display = 'inline-block';
        };
        reader.readAsArrayBuffer(fileInput.files[0]);
    }

    function splitLogic(roll, total) {
        let remaining = total;
        
        // 1. Objective (Max 10) - Randomly between 5 and 10, but not exceeding remaining
        let objLimit = Math.min(remaining, 10);
        let obj = Math.max(0, Math.min(objLimit, Math.floor(Math.random() * 4) + 7));
        if (remaining <= 10) obj = remaining; 
        remaining -= obj;

        // 2. Assignment (Max 5) - Rounded
        let assCO1 = "", assCO2 = "";
        let assVal = Math.min(remaining, 5);
        if (Math.random() > 0.5) assCO1 = assVal; else assCO2 = assVal;
        remaining -= assVal;

        // 3. Descriptive (4 Questions out of 6) - Whole Numbers
        let qs = ["", "", "", "", "", ""]; 
        let chosenIndices = [0, 1, 2, 3, 4, 5].sort(() => 0.5 - Math.random()).slice(0, 4);
        
        chosenIndices.forEach(i => qs[i] = 0);

        // Distribute remaining whole points
        while (remaining > 0) {
            let idx = chosenIndices[Math.floor(Math.random() * chosenIndices.length)];
            if (qs[idx] < 5) {
                qs[idx] += 1; // Increment by 1 only
                remaining -= 1;
            }
            if (chosenIndices.every(i => qs[i] >= 5)) break;
        }

        // Clean up: 0 to blank
        qs = qs.map(v => v === 0 ? "" : v);

        return {
            "Roll No": roll,
            "Q1(5)": qs[0], "Q2(5)": qs[1], "Q3(5)": qs[2],
            "Q4(5)": qs[3], "Q5(5)": qs[4], "Q6(5)": qs[5],
            "Objective(10)": obj || "",
            "Assign-CO1": assCO1 || "",
            "Assign-CO2": assCO2 || "",
            "Total": total
        };
    }

    function exportToExcel() {
        const worksheet = XLSX.utils.json_to_sheet(processedRows);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Marks");
        XLSX.writeFile(workbook, "Marks_Rounded_Final.xlsx");
    }
</script>

</body>
</html>
